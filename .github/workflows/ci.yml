name: Testnet CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Install pinned Stellar CLI
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/stellar/stellar-cli/releases/download/v23.1.4/stellar-cli-23.1.4-x86_64-unknown-linux-gnu.tar.gz \
            | tar --extract --gzip
          sudo install stellar /usr/local/bin/stellar
          stellar --version
      - name: Build Soroban WASM
        run: |
          stellar contract build

  services:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/go.mod
          cache-dependency-path: services/go.sum
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./...

  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm --prefix app ci
      - run: npm run check

  fixture-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Reject preview basket IDs in production configuration
        shell: bash
        run: |
          if grep -RIE 'CBASKETTESTNET|CTEST-ONLY|CFIXTURE' \
            --exclude='*.test.ts' --exclude='*.test.tsx' \
            app config .env.testnet.example; then
            echo 'Preview fixture ID found in production configuration.' >&2
            exit 1
          fi
